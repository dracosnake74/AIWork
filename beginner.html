<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初學者英語練習 - Baby Teacher Mode</title>
    <link rel="stylesheet" href="style.css"> <style>
        /* 針對初學者頁面的額外微調 */
        #chat-box {
            height: 450px; /* 稍微縮小高度，讓畫面更集中 */
        }
        .beginner-hint {
            font-size: 13px;
            color: #666;
            text-align: center;
            margin-bottom: 10px;
            background: #fff8e1;
            padding: 8px;
            border-radius: 8px;
        }
        .start-session-btn {
            background-color: #ff9800; /* 暖色調，代表溫暖與鼓勵 */
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            margin: 20px auto;
            display: block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .start-session-btn:hover {
            transform: scale(1.05);
            background-color: #f57c00;
        }
    </style>
<script>window.ENV_CONFIG={API_KEY:"AIzaSyCZTI2pt20KqrdW7qzXMuCZyqVbhU6nC8M"};</script></head>
<body>

    <nav style="margin-bottom: 20px; text-align: left;">
        <a href="index.html" style="text-decoration: none; color: #0084ff;">⬅️ 返回專業導師模式</a>
    </nav>

    <h2 style="text-align: center; color: #ff9800;">👶 英語北鼻老師 (Baby Teacher)</h2>
    
    <div class="beginner-hint">
        💡 <b>提示：</b>我是正在學英文的小北鼻，你可以像爸爸媽媽一樣教我英文。<br>
        你可以對我說 "Hello" 或分享你今天做了什麼。
    </div>

    <div id="chat-box">
        <div id="welcome-screen" style="text-align: center; margin-top: 50px;">
            <p>準備好教北鼻老師說英文了嗎？</p>
            <button class="start-session-btn" onclick="initBeginnerChat()">開始練習對話</button>
        </div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="可以用簡單的英文跟我聊天...">
        <button id="mic-btn" class="icon-btn" onclick="startVoiceRecognition()">🎤</button>
        <button id="send-btn" class="icon-btn" onclick="sendUserMessage()">⬆️</button>
    </div>

    <script src="script2.js"></script>

    <script>
        // 額外的小邏輯：點擊按鈕後隱藏歡迎畫面並啟動對話
        function initBeginnerChat() {
            document.getElementById('welcome-screen').style.display = 'none';
            // 因為 script2.js 需要一個 topic，我們預設給它 'Daily Life' (日常生活)
            startConversation('Daily Life');
        }
    </script>
</body>
</html>
