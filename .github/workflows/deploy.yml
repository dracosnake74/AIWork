name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject API Key
        env:
          MY_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 使用環境變數注入，避免特殊字元造成 sed 失敗
          find . -name "*.html" -exec sed -i "s|</head>|<script>window.ENV_CONFIG={API_KEY:\"$MY_KEY\"};</script></head>|g" {} +

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
