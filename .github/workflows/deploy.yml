name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # [關鍵新增] 直接在代碼中強制索取寫入權限，破解 128 錯誤！
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject API Key
        env:
          MY_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          find . -name "*.html" -exec sed -i "s|</head>|<script>window.ENV_CONFIG={API_KEY:\"$MY_KEY\"};</script></head>|g" {} + || true

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
